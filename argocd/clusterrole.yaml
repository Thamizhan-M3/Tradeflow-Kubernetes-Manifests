apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-rollouts-clusterrole
rules:
- apiGroups: ["argoproj.io"]
  resources: ["rollouts", "experiments", "analyses"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events", "pods", "services"]
  verbs: ["get", "list", "watch"]
