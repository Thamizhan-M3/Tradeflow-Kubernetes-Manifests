global:
  environment: dev
  ingress:
    domain: dev.tradeflow.local

frontend:
  replicaCount: 2
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

user:
  replicaCount: 2
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

stock:
  replicaCount: 2
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

trading:
  replicaCount: 2
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

portfolio:
  replicaCount: 2
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

mongodb:
  architecture: replicaset

  replicaCount: 3

  auth:
    enabled: false

  replicaSetName: rs0

  image:
    registry: docker.io
    repository: bitnami/mongodb
    tag: 7.0.11-debian-12
    pullPolicy: IfNotPresent

  persistence:
    enabled: true
    storageClass: nfs-storage
    size: 5Gi

  resources:
    limits:
      cpu: "500m"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "512Mi"

  arbiter:
    enabled: true
    image:
      registry: docker.io
      repository: bitnami/mongodb
      tag: 7.0.11-debian-12
    resources:
      limits:
        cpu: "200m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"