apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway.fullname" . }}-config
  labels:
    {{- include "gateway.selectorLabels" . | nindent 4 }}
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 80;
        
        location /health {
          return 200 'healthy';
        }

        location /api/user/ {
          proxy_pass http://user-{{ .Release.Name }}:8080/;
        }
        
        location /api/stock/ {
          proxy_pass http://stock-{{ .Release.Name }}:8080/;
        }

        location /api/trading/ {
          proxy_pass http://trading-{{ .Release.Name }}:8080/;
        }

        location /api/portfolio/ {
          proxy_pass http://portfolio-{{ .Release.Name }}:8080/;
        }
      }
    }
