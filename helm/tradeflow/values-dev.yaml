global:
  environment: dev
  ingress:
    domain: dev.tradeflow.local

frontend:
  replicaCount: 2
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

user:
  replicaCount: 2
  image:
    repository: thamizhanm3/tradeflow-user
    tag: "v0.0.1"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 80
  env:
    MONGODB_URI: mongodb://tradeflow-dev-mongodb-0.tradeflow-dev-mongodb-headless:27017,tradeflow-dev-mongodb-1.tradeflow-dev-mongodb-headless:27017,tradeflow-dev-mongodb-2.tradeflow-dev-mongodb-headless:27017/user-db?replicaSet=rs0



stock:
  replicaCount: 2
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

trading:
  replicaCount: 2
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

portfolio:
  replicaCount: 2
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

mongodb:
  architecture: replicaset
  replicaCount: 3
  auth:
    enabled: false
  replicaSetName: rs0
  image:
    registry: docker.io
    repository: bitnami/mongodb
    tag: latest
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClass: nfs-storage
    size: 5Gi
  resources:
    limits:
      cpu: "500m"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "512Mi"
  arbiter:
    enabled: false
    image:
      registry: docker.io
      repository: bitnami/mongodb
      tag: latest
    resources:
      limits:
        cpu: "250m"
        memory: "512Mi"
      requests:
        cpu: "150m"
        memory: "256Mi"