global:
  environment: default
  ingress:
    domain: tradeflow.local

# -------------------------
# MICROSERVICES DEFAULTS
# -------------------------
frontend:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      cpu: "300m"
      memory: "256Mi"
    requests:
      cpu: "150m"
      memory: "128Mi"

user:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      cpu: "300m"
      memory: "256Mi"
    requests:
      cpu: "150m"
      memory: "128Mi"
  
  probes:
    liveness:
      path: /health
      port: 4001
    readiness:
      path: /health
      port: 4001
    startup:
      path: /health
      port: 4001
      failureThreshold: 30
      periodSeconds: 10
  service:
    type: ClusterIP
    port: 4001

stock:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      cpu: "300m"
      memory: "256Mi"
    requests:
      cpu: "150m"
      memory: "128Mi"

trading:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      cpu: "300m"
      memory: "256Mi"
    requests:
      cpu: "150m"
      memory: "128Mi"

portfolio:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      cpu: "300m"
      memory: "256Mi"
    requests:
      cpu: "150m"
      memory: "128Mi"

mongodb:
  enabled: true

gateway:
  enabled: true

haproxy:
  enabled: true