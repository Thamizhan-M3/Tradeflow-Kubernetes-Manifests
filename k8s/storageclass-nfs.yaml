apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-storage

# IMPORTANT: must match your installed provisioner
provisioner: cluster.local/nfs-storage-nfs-subdir-external-provisioner

reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true

mountOptions:
  - nfsvers=4.1
  - hard
  - timeo=600
  - retrans=2