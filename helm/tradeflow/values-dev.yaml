global:
  environment: dev
  ingress:
    domain: dev.tradeflow.local

frontend:
  replicaCount: 2
  image:
    repository: thamizhanm3/tradeflow-frontend
    tag: "v0.0.3"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 80
  env:
    VITE_USERS_API: "http://tradeflow-dev-user.tradeflow-dev.svc.cluster.local:4001"
    VITE_STOCKS_API: "http://tradeflow-dev-stock.tradeflow-dev.svc.cluster.local:4002"
    VITE_TRADES_API: "http://tradeflow-dev-trading.tradeflow-dev.svc.cluster.local:4003"
    VITE_PORTFOLIO_API: "http://tradeflow-dev-portfolio.tradeflow-dev.svc.cluster.local:4004"

user:
  replicaCount: 2
  image:
    repository: thamizhanm3/tradeflow-user
    tag: "v0.0.1"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 80
  env:
    MONGODB_URI: "mongodb://tradeflow-dev-mongodb-0.tradeflow-dev-mongodb-headless:27017,tradeflow-dev-mongodb-1.tradeflow-dev-mongodb-headless:27017,tradeflow-dev-mongodb-2.tradeflow-dev-mongodb-headless:27017/user-db?replicaSet=rs0"
    PORT: "4001"


