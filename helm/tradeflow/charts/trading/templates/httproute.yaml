apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "trading.fullname" . }}-route
  labels:
    app.kubernetes.io/part-of: {{ include "trading.fullname" . }}
    environment: {{ .Values.global.environment }}
spec:
  parentRefs:
    - name: {{ include "tradeflow.fullname" . }}-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/trading
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api
      backendRefs:
        - name: {{ include "trading.fullname" . }}
          port: {{ .Values.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: {{ include "trading.fullname" . }}
          port: {{ .Values.service.port }}