replicaCount: 3

image:
  repository: mongo
  tag: "6.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 27017

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

storage:
  size: 10Gi
  className: nfs-storage

probes:
  liveness:
    port: 27017
  readiness:
    port: 27017
  startup:
    port: 27017
    failureThreshold: 30
    periodSeconds: 10
