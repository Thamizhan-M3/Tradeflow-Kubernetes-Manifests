apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tradeflow-mongodb-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: tradeflow
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: mongodb
    targetRevision: 14.0.0
    helm:
      releaseName: tradeflow-dev-mongodb
      values: |
        architecture: replicaset
        replicaCount: 3
        replicaSetName: rs0
        image:
          registry: docker.io
          repository: bitnami/mongodb
          tag: latest
          pullPolicy: IfNotPresent
        auth:
          enabled: false
        persistence:
          enabled: true
          storageClass: nfs-storage
          size: 2Gi
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
  destination:
    server: https://kubernetes.default.svc
    namespace: tradeflow-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tradeflow-dev-gateway
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: tradeflow
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Thamizhan-M3/Tradeflow-Kubernetes-Manifests.git
    targetRevision: HEAD
    path: helm/tradeflow/charts/common
    helm:
      releaseName: tradeflow-dev-gateway
      values: |
        gateway:
          enabled: true
          className: kgateway
        global:
          environment: dev
  destination:
    server: https://kubernetes.default.svc
    namespace: tradeflow-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true