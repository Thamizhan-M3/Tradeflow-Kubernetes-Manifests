global:
  environment: default
  ingress:
    domain: tradeflow.local
  gateway:
    enabled: true
    className: kgateway
    name: tradeflow-gateway
  service:
    type: ClusterIP

# -------------------------
# MICROSERVICES DEFAULTS
# -------------------------
frontend:
  enabled: true
  routePath: /
  probes:
    path: /
    failureThreshold: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  service:
    type: ClusterIP
    port: 80
  env:
    PORT: "80"

service:
  type: ClusterIP

user:
  enabled: true
  routePath: /users
  probes:
    path: /health
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  service:
    type: ClusterIP
    port: 4001
  env:
    PORT: "4001"
  routePath: "/api/users"

stock:
  enabled: true
  routePath: /stocks
  probes:
    path: /health
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  service:
    type: ClusterIP
    port: 4002
  env:
    PORT: "4002"
  routePath: "/api/stocks"

trading:
  enabled: true
  routePath: /trades
  probes:
    path: /health
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  service:
    type: ClusterIP
    port: 4003
  env:
    PORT: "4003"
  routePath: "/api/trades"

portfolio:
  enabled: true
  routePath: /portfolio
  probes:
    path: /health
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  service:
    type: ClusterIP
    port: 4004
  env:
    PORT: "4004"
  routePath: "/api/portfolio"

mongodb:
  enabled: true
  gateway:
    enabled: false

gateway:
  enabled: true

haproxy:
  enabled: true

# ──────────────────────────────────────────────────────────────
# COMMON CHART VALUES
# Gateway is deployed via the common sub-chart.
# Values here are scoped under 'common' and passed to it.
# ──────────────────────────────────────────────────────────────
common:
  gateway:
    enabled: true
    className: kgateway