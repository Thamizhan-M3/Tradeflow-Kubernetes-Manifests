    PORT: "4004"

# =========================
# MONGODB (BITNAMI STYLE)
# =========================

mongodb:
  architecture: replicaset
  replicaCount: 3
  auth:
    enabled: false
  replicaSetName: rs0
  image:
    registry: docker.io
    repository: bitnami/mongodb
    tag: latest
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClass: nfs-storage
    size: 5Gi
  resources:
    limits:
      cpu: "500m"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "512Mi"
  arbiter:
    enabled: false
    image:
      registry: docker.io
      repository: bitnami/mongodb
      tag: latest
    resources:
      limits:
        cpu: "250m"
        memory: "512Mi"
      requests:
        cpu: "150m"
        memory: "256Mi"

gateway:
  nodePort: 31871 # Shifted from 31865
  className: eg