mongodb:
  architecture: standalone
  replicaCount: 1
  auth:
    enabled: false
  replicaSetName: rs0
  image:
    registry: docker.io
    repository: bitnami/mongodb
    tag: latest
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClass: nfs-storage
    size: 5Gi
  resources:
    limits:
      cpu: "500m"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "512Mi"
  arbiter:
    enabled: false
    image:
      registry: docker.io
      repository: bitnami/mongodb
      tag: latest
    resources:
      limits:
        cpu: "250m"
        memory: "512Mi"
      requests:
        cpu: "150m"
        memory: "256Mi"
  # Add readiness probe overrides
  readinessProbe:
    initialDelaySeconds: 60   # wait longer before first check
    periodSeconds: 10         # check every 10s
    timeoutSeconds: 5         # fail if probe takes >5s
    failureThreshold: 6       # allow multiple failures before marking unready


gateway:
  nodePort: 31870 # Shifted from 31864 to avoid the conflict
  className: kgateway