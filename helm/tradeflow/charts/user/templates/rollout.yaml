apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "user.fullname" . }}
  labels:
    {{- include "user.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "user.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "user.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.env.PORT | int }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "user.fullname" . }}-config
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: {{ .Values.env.PORT | int }}
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: {{ .Values.env.PORT | int }}
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: {{ .Values.env.PORT | int }}
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  strategy:
    blueGreen:
      # Active service — receives 100% live traffic at all times
      activeService: {{ include "user.fullname" . }}
      # Preview service — receives the new (green) version for validation
      previewService: {{ include "user.fullname" . }}-preview
      # Require manual promotion via: kubectl argo rollouts promote <name> -n <ns>
      autoPromotionEnabled: false
      # Keep old (blue) ReplicaSet for 60s after promotion before scaling down
      scaleDownDelaySeconds: 60
      # Abort automatically if the new ReplicaSet doesn't become Ready
      abortScaleDownDelaySeconds: 30
