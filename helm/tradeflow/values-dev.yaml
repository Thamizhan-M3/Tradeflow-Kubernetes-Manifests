    repository: thamizhanm3/tradeflow-trading
    tag: "v0.0.1"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "50m"
      memory: "64Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 80
  env:
    MONGODB_URI: "mongodb://tradeflow-dev-mongodb:27017/user-db"
    PORT: "4003"

