{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: user-service-route
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: tradeflow
    environment: {{ .Values.global.environment }}
spec:
  parentRefs:
    - name: tradeflow-gateway
      namespace: {{ .Release.Namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.user.routePath | default "/api/users" }}
      backendRefs:
        - name: user-service
          port: {{ .Values.user.service.port }}
---
