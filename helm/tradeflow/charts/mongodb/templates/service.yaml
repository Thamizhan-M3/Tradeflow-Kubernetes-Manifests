apiVersion: v1
kind: Service
metadata:
  name: {{ include "mongodb.fullname" . }}-headless
  labels:
    {{- include "mongodb.selectorLabels" . | nindent 4 }}

spec:
  clusterIP: None

  ports:
    - port: 27017
      targetPort: 27017
      name: mongodb

  selector:
    {{- include "mongodb.selectorLabels" . | nindent 4 }}