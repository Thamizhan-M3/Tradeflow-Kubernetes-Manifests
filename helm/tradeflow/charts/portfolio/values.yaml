replicaCount: 2

image:
  repository: thamizhanm3/tradeflow-portfolio
  tag: "v0.0.1"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

probes:
  liveness:
    path: /api/health
    port: 8080
  readiness:
    path: /api/health
    port: 8080
  startup:
    path: /api/health
    port: 8080
    failureThreshold: 30
    periodSeconds: 10
