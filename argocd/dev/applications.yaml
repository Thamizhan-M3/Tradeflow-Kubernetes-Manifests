# ==============================================================
# ArgoCD Application Manifests — Tradeflow (Dev Namespace)
# Deploy: kubectl apply -f argocd/dev/
# ==============================================================

# ── USER SERVICE ──────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tradeflow-user-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: tradeflow
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Thamizhan-M3/Tradeflow-Kubernetes-Manifests.git
    targetRevision: HEAD
    path: helm/tradeflow/charts/user
    helm:
      releaseName: tradeflow-dev-user
      values: |
        replicaCount: 2
        image:
          repository: thamizhanm3/tradeflow-user
          tag: "v0.0.1"
          pullPolicy: IfNotPresent
        service:
          type: ClusterIP
          port: 4001
        probes:
          path: /health
          failureThreshold: 30
          periodSeconds: 10
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
        autoscaling:
          enabled: true
          minReplicas: 2
          maxReplicas: 4
          targetCPUUtilizationPercentage: 80
        env:
          MONGODB_URI: "mongodb://tradeflow-dev-mongodb-0.tradeflow-dev-mongodb-headless:27017,tradeflow-dev-mongodb-1.tradeflow-dev-mongodb-headless:27017,tradeflow-dev-mongodb-2.tradeflow-dev-mongodb-headless:27017/user_db_dev?replicaSet=rs0"
          PORT: "4001"
        routePath: /users
        global:
          environment: dev
  destination:
    server: https://kubernetes.default.svc
    namespace: tradeflow-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---

