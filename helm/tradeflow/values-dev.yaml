global:
  environment: dev
  ingress:
    domain: dev.tradeflow.local

frontend:
  replicaCount: 2
  image:
    repository: thamizhanm3/tradeflow-frontend
    tag: "v0.0.3"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "50m"
      memory: "64Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 80
  env:
    VITE_USERS_API: "http://tradeflow-dev-user:4001/api"
    VITE_STOCKS_API: "http://tradeflow-dev-stock:4002/api"
    VITE_TRADES_API: "http://tradeflow-dev-trading:4003/api"
    VITE_PORTFOLIO_API: "http://tradeflow-dev-portfolio:4004/api"

user:
  replicaCount: 2
  image:
    repository: thamizhanm3/tradeflow-user
    tag: "v0.0.1"
    pullPolicy: IfNotPresent
  resources:
