replicaCount: 3

image:
  repository: mongo
  tag: "7.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 27017

resources:
  limits:
    cpu: "500m"
    memory: "1Gi"
  requests:
    cpu: "250m"
    memory: "512Mi"

storage:
  size: 10Gi
  className: nfs-storage

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10

  readiness:
    initialDelaySeconds: 20
    periodSeconds: 10

  startup:
    failureThreshold: 30
    periodSeconds: 10