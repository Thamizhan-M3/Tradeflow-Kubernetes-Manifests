apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Release.Name }}-gateway
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: {{ .Values.gateway.className | default "kgateway" }}
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway-nodeport
  namespace: kgateway-system  # Must match where the kgateway pod is
spec:
  type: NodePort
  selector:
    # Adjust these based on the output of 'kubectl get pods -n kgateway-system --show-labels'
    app: kgateway 
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080 # KGateway/Envoy usually listens on 8080 or 8443 inside the pod
      nodePort: {{ .Values.gateway.nodePort }}