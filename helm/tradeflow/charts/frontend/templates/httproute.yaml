apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: tradeflow
    environment: {{ .Values.global.environment }}
spec:
  parentRefs:
    - name: tradeflow-gateway
      namespace: {{ .Release.Namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.frontend.routePath | default "/" }}
      backendRefs:
        - name: tradeflow-dev-frontend
          port: {{ .Values.frontend.service.port }}