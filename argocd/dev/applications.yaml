# ── FRONTEND ──────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tradeflow-frontend-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: tradeflow
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Thamizhan-M3/Tradeflow-Kubernetes-Manifests.git
    targetRevision: HEAD
    path: helm/tradeflow/charts/frontend
    helm:
      releaseName: tradeflow-dev-frontend
      values: |
        replicaCount: 2
        image:
          repository: thamizhanm3/tradeflow-frontend
          tag: "v0.0.3"
          pullPolicy: IfNotPresent
        service:
          type: ClusterIP
          port: 80
        probes:
          path: /
          failureThreshold: 30
          periodSeconds: 10
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
        autoscaling:
          enabled: true
          minReplicas: 2
          maxReplicas: 4
          targetCPUUtilizationPercentage: 80
        env:
          PORT: "80"
          VITE_USERS_API: "/api/users"
          VITE_STOCKS_API: "/api/stocks"
          VITE_TRADES_API: "/api/trades"
          VITE_PORTFOLIO_API: "/api/portfolio"
        routePath: /
        global:
          environment: dev
  destination:
    server: https://kubernetes.default.svc
    namespace: tradeflow-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tradeflow-mongodb-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: tradeflow
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Thamizhan-M3/Tradeflow-Kubernetes-Manifests.git
    targetRevision: HEAD
    path: helm/tradeflow
    helm:
      releaseName: tradeflow-dev-mongodb
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: tradeflow-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tradeflow-dev-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Thamizhan-M3/Tradeflow-Kubernetes-Manifests.git
    targetRevision: HEAD
    path: helm/tradeflow/templates   # adjust path to where gateway.yaml lives
    helm:
      releaseName: tradeflow-dev-gateway
      valueFiles:
        - values-dev.yaml
        - values.yaml   # or values-prod.yaml depending on environment
  destination:
    server: https://kubernetes.default.svc
    namespace: tradeflow-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
