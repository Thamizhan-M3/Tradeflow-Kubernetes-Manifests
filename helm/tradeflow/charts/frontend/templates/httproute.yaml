{{- if .Values.global.gateway.enabled | default true }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: tradeflow
    environment: {{ .Values.global.environment }}
spec:
  parentRefs:
    - name: tradeflow-gateway
      namespace: {{ .Release.Namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.routePath | default "/" }}
      backendRefs:
        - name: frontend-service
          port: {{ .Values.service.port }}
{{- end }}
