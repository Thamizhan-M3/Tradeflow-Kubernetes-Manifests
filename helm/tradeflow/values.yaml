global:
  environment: default
  ingress:
    domain: tradeflow.local
  gateway:
    enabled: true
    className: kgateway
    name: tradeflow-gateway

# -------------------------
# MICROSERVICES DEFAULTS
# -------------------------
frontend:
  enabled: true
  routePath: /
  probes:
    path: /
    failureThreshold: 30
    periodSeconds: 10
  service:
    type: ClusterIP
    port: 80
  env:
    PORT: "80"

user:
  enabled: true
  routePath: /api/users
  probes:
    path: /health
    failureThreshold: 30
    periodSeconds: 10
  service:
    type: ClusterIP
    port: 4001
  env:
    PORT: "4001"

stock:
  enabled: true
  routePath: /api/stocks
  probes:
    path: /health
    failureThreshold: 30
    periodSeconds: 10
  service:
    type: ClusterIP
    port: 4002
  env:
    PORT: "4002"

trading:
  enabled: true
  routePath: /api/trades
  probes:
    path: /health
    failureThreshold: 30
    periodSeconds: 10
  service:
    type: ClusterIP
    port: 4003
  env:
    PORT: "4003"

portfolio:
  enabled: true
  routePath: /api/portfolio
  probes:
    path: /health
    failureThreshold: 30
    periodSeconds: 10
  service:
    type: ClusterIP
    port: 4004
  env:
    PORT: "4004"

mongodb:
  enabled: true

gateway:
  enabled: true

haproxy:
  enabled: true