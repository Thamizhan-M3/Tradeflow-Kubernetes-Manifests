    PORT: "4004"

mongodb:
  architecture: standalone
  replicaCount: 1
  auth:
    enabled: false
  image:
    registry: docker.io
    repository: bitnami/mongodb
    tag: latest
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClass: nfs-storage
    size: 5Gi
  resources:
    limits:
      cpu: "500m"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "512Mi"
  readinessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6



gateway:
  nodePort: 31870 # Shifted from 31864 to avoid the conflict
  className: kgateway