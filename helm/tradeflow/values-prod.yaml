global:
  environment: prod
  ingress:
    domain: tradeflow.com

frontend:
  replicaCount: 3
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"

user:
  replicaCount: 3
  image:
    repository: thamizhanm3/tradeflow-user
    tag: "v0.0.1"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "400m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 80

stock:
  replicaCount: 3
  resources:
    limits:
      cpu: "400m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"

trading:
  replicaCount: 3
  resources:
    limits:
      cpu: "400m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"

portfolio:
  replicaCount: 3
  resources:
    limits:
      cpu: "400m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"

# =========================
# MONGODB (BITNAMI STYLE)
# =========================

mongodb:
  architecture: replicaset
  replicaCount: 3
  auth:
    enabled: false
  replicaSetName: rs0
  image:
    registry: docker.io
    repository: bitnami/mongodb
    tag: latest
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClass: nfs-storage
    size: 5Gi
  resources:
    limits:
      cpu: "500m"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "512Mi"
  arbiter:
    enabled: false
    image:
      registry: docker.io
      repository: bitnami/mongodb
      tag: latest
    resources:
      limits:
        cpu: "250m"
        memory: "512Mi"
      requests:
        cpu: "150m"
        memory: "256Mi"