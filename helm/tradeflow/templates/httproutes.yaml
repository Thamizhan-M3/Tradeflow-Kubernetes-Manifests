{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: user-service-route
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: tradeflow
    environment: {{ .Values.global.environment }}
spec:
  parentRefs:
    - name: tradeflow-gateway
      namespace: {{ .Release.Namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/users
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api
      backendRefs:
        - name: tradeflow-dev-user
          port: 4001
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: tradeflow-dev-user
          port: 4001

