apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "portfolio.fullname" . }}-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - name: {{ .Release.Name }}-gateway
    namespace: {{ .Release.Namespace }}
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/portfolio
    backendRefs:
    - name: {{ include "portfolio.fullname" . }}
      port: {{ .Values.service.port }}