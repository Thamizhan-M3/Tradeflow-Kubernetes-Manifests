# ── FRONTEND ──────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tradeflow-frontend-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: tradeflow
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Thamizhan-M3/Tradeflow-Kubernetes-Manifests.git
    targetRevision: HEAD
    path: helm/tradeflow/charts/frontend
    helm:
      releaseName: tradeflow-prod-frontend
      values: |
        replicaCount: 3
        image:
          repository: thamizhanm3/tradeflow-frontend
          tag: "v0.0.3"
          pullPolicy: IfNotPresent
        service:
          type: ClusterIP
          port: 80
        probes:
          path: /
          failureThreshold: 30
          periodSeconds: 10
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
        autoscaling:
          enabled: true
          minReplicas: 3
          maxReplicas: 6
          targetCPUUtilizationPercentage: 80
        env:
          PORT: "80"
          VITE_USERS_API: "/api/users"
          VITE_STOCKS_API: "/api/stocks"
          VITE_TRADES_API: "/api/trades"
          VITE_PORTFOLIO_API: "/api/portfolio"
        routePath: /
        global:
          environment: prod
  destination:
    server: https://kubernetes.default.svc
    namespace: tradeflow-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tradeflow-mongodb-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: tradeflow
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: mongodb
    targetRevision: 14.0.0
    helm:
      releaseName: tradeflow-prod-mongodb
      values: |
        architecture: replicaset
        replicaCount: 3
        replicaSetName: rs0
        image:
          registry: docker.io
          repository: bitnami/mongodb
          tag: latest
          pullPolicy: IfNotPresent
        auth:
          enabled: false
        persistence:
          enabled: true
          storageClass: nfs-storage
          size: 2Gi
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
  destination:
    server: https://kubernetes.default.svc
    namespace: tradeflow-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tradeflow-prod-gateway
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: tradeflow
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Thamizhan-M3/Tradeflow-Kubernetes-Manifests.git
    targetRevision: HEAD
    path: helm/tradeflow/charts/common
    helm:
      releaseName: tradeflow-prod-gateway
      values: |
        gateway:
          enabled: true
          className: kgateway
        global:
          environment: prod
  destination:
    server: https://kubernetes.default.svc
    namespace: tradeflow-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true