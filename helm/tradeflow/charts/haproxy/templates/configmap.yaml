apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "haproxy.fullname" . }}-config
  labels:
    {{- include "haproxy.selectorLabels" . | nindent 4 }}
data:
  haproxy.cfg: |
    global
        log stdout format raw local0

    defaults
        log global
        mode http
        option httplog
        option dontlognull
        timeout connect 5000
        timeout client  50000
        timeout server  50000

    frontend http_front
        bind *:80
        
        acl is_health path /health
        http-request return status 200 content-type text/plain string "healthy" if is_health

        default_backend frontend_back

    backend frontend_back
        balance roundrobin
        server frontend frontend-{{ .Release.Name }}:80 check
