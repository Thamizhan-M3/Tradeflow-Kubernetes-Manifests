global:
  environment: prod
  ingress:
    domain: tradeflow.com

frontend:
  replicaCount: 3
  image:
    repository: thamizhanm3/tradeflow-frontend
    tag: "v0.0.3"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  env:
    VITE_USERS_API: "http://tradeflow-gateway/api/users"
    VITE_STOCKS_API: "http://tradeflow-gateway/api/stocks"
    VITE_TRADES_API: "http://tradeflow-gateway/api/trades"
    VITE_PORTFOLIO_API: "http://tradeflow-gateway/api/portfolio"

user:
  replicaCount: 3
  image:
    repository: thamizhanm3/tradeflow-user
    tag: "v0.0.1"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 6
    targetCPUUtilizationPercentage: 80
  env:
    MONGODB_URI: "mongodb://tradeflow-prod-mongodb-0.tradeflow-prod-mongodb-headless:27017,tradeflow-prod-mongodb-1.tradeflow-prod-mongodb-headless:27017,tradeflow-prod-mongodb-2.tradeflow-prod-mongodb-headless:27017/user-db?replicaSet=rs0"
    PORT: "4001"

